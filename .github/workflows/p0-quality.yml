name: P0 Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/p0-a-rebased

permissions:
  contents: read

jobs:
  quality:
    name: Validate AQWELIA
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: file:/tmp/aqwelia-ci.db
      NEXTAUTH_SECRET: test-secret-for-ci-only-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3099
      AUTH_TRUST_HOST: "true"
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_test_ci_placeholder
      REVENUECAT_WEBHOOK_SECRET: rc_wh_test_ci_only

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Lint
        run: bun run lint

      - name: Typecheck application
        run: bun run typecheck

      - name: Typecheck tools
        run: bun run typecheck:tools

      - name: Check translations
        run: python3 scripts/i18n/check-hardcoded-strings.py

      - name: Run smoke tests
        run: bash tests/run-smoke-tests.sh

      - name: Build production application
        run: bun run build
