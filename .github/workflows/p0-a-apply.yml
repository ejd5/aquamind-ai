          def update_matching_faqs(node, locale_cfg):
              if isinstance(node, dict):
                  q4 = str(node.get('faq4Q', '')).lower()
                  if 'hors ligne' in q4 or 'offline' in q4 or 'sin conexión' in q4 or 'senza connessione' in q4:
                      if 'faq4A' in node:
                          node['faq4A'] = locale_cfg['offline_b2c']
                  q8 = str(node.get('faqQ8', '')).lower()
                  if 'hors-ligne' in q8 or 'hors ligne' in q8 or 'offline' in q8 or 'sin conexión' in q8 or 'senza connessione' in q8:
                      if 'faqA8' in node:
                          node['faqA8'] = locale_cfg['offline_pro']
                  for value in node.values():
                      update_matching_faqs(value, locale_cfg)
              elif isinstance(node, list):
                  for value in node:
                      update_matching_faqs(value, locale_cfg)

          def replace_key_recursive(node, key, value):
              if isinstance(node, dict):
                  for k in list(node.keys()):
                      if k == key:
                          node[k] = value
                      else:
                          replace_key_recursive(node[k], key, value)
              elif isinstance(node, list):
                  for item in node:
                      replace_key_recursive(item, key, value)

          for locale in locales:
              path = ROOT / 'src' / 'i18n' / 'locales' / f'{locale}.json'
              data = json.loads(path.read_text(encoding='utf-8'))
              cfg = copy[locale]
              growth = data.get('growth')
              if not isinstance(growth, dict):
                  raise SystemExit(f'Missing growth namespace in {locale}')
              growth.update(cfg['growth'])
              pro = data.get('pro')
              if not isinstance(pro, dict):
                  raise SystemExit(f'Missing pro namespace in {locale}')
              pro.update(cfg['pro'])
              for key, value in cfg['general'].items():
                  replace_key_recursive(data, key, value)
              update_matching_faqs(data, cfg)
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          growth_page = ROOT / 'src' / 'app' / 'growth' / 'page.tsx'
          text = growth_page.read_text(encoding='utf-8')
          old_stats = """  const STATS = [
            { value: '10', label: t('statAgents') },
            { value: '+38%', label: t('statConversion') },
            { value: '< 2min', label: t('statResponseTime') },
            { value: '24/7', label: t('statAvailability') },
          ]"""
          new_stats = """  const STATS = [
            { value: '10', label: t('statAgents') },
            { value: '0–100', label: t('statConversion') },
            { value: '6', label: t('statResponseTime') },
            { value: '100%', label: t('statAvailability') },
          ]"""
          if old_stats not in text:
              raise SystemExit('Growth STATS block not found')
          growth_page.write_text(text.replace(old_stats, new_stats), encoding='utf-8')

          plans_path = ROOT / 'src' / 'lib' / 'billing' / 'plans.ts'
          plans = plans_path.read_text(encoding='utf-8')
          plans = plans.replace(
              'maxPhotoScansPerMonth: 999999, // Scans illimités (P0-A decision)',
              'maxPhotoScansPerMonth: 2, // 2 scans photo / mois — offre Découverte'
          ).replace(
              'maxTestsPerMonth: 999999,      // Tests illimités (P0-A decision)',
              'maxTestsPerMonth: 2,           // 2 tests manuels / mois — offre Découverte'
          )
          if 'maxPhotoScansPerMonth: 999999, // Scans illimités (P0-A decision)' in plans:
              raise SystemExit('Free photo scan limit was not updated')
          if 'maxTestsPerMonth: 999999,      // Tests illimités (P0-A decision)' in plans:
              raise SystemExit('Free water test limit was not updated')
          plans_path.write_text(plans, encoding='utf-8')

          test_path = ROOT / 'tests' / 'p0-a-marketing-truth.test.ts'
          test_path.write_text("""import { readFileSync } from 'node:fs'
          import { join } from 'node:path'
          import { describe, expect, it } from 'vitest'

          const ROOT = process.cwd()
          const locales = ['fr', 'en', 'es', 'de', 'it', 'pt', 'nl']

          describe('P0-A marketing truth', () => {
            it('removes unsupported Growth performance claims', () => {
              const page = readFileSync(join(ROOT, 'src/app/growth/page.tsx'), 'utf8')
              expect(page).not.toContain("value: '+38%'")
              expect(page).not.toContain("value: '< 2min'")
              expect(page).not.toContain("value: '24/7'")
              expect(page).toContain("value: '0–100'")
              expect(page).toContain("value: '100%'")
            })

            it.each(locales)('uses supervised automation copy in %s', (locale) => {
              const data = JSON.parse(readFileSync(join(ROOT, `src/i18n/locales/${locale}.json`), 'utf8'))
              const growth = JSON.stringify(data.growth).toLowerCase()
              expect(growth).not.toContain('10 agents ia')
              expect(growth).not.toContain('10 specialized ai agents')
              expect(growth).not.toContain('working 24/7')
              expect(growth).not.toContain('travaillent 24/7')
              expect(growth).toContain(locale === 'en' ? 'automations' : locale === 'de' ? 'automatisierungen' : locale === 'nl' ? 'automatiseringen' : locale === 'pt' ? 'automações' : locale === 'it' ? 'automazioni' : locale === 'es' ? 'automatizaciones' : 'automatisations')
            })

            it.each(locales)('does not advertise unsupported Pro integrations in %s', (locale) => {
              const data = JSON.parse(readFileSync(join(ROOT, `src/i18n/locales/${locale}.json`), 'utf8'))
              const pro = JSON.stringify(data.pro)
              expect(pro).not.toMatch(/QuickBooks|Xero|SLA 99[,.]9|synchronisation comptable/i)
              expect(pro).not.toMatch(/tournées optimisées par géolocalisation/i)
            })

            it('enforces the advertised Discovery limits', () => {
              const plans = readFileSync(join(ROOT, 'src/lib/billing/plans.ts'), 'utf8')
              expect(plans).toContain('maxPhotoScansPerMonth: 2')
              expect(plans).toContain('maxTestsPerMonth: 2')
            })
          })
          """, encoding='utf-8')

          for temporary in [
              ROOT / 'P0_A_SCAN.txt',
              ROOT / '.github' / 'workflows' / 'p0-a-scan.yml',
              ROOT / '.github' / 'workflows' / 'p0-a-apply.yml',
          ]:
              if temporary.exists():
                  temporary.unlink()
          PY

      - name: Validate JSON and targeted invariants
        shell: bash
        run: |
          set -euo pipefail
          for file in src/i18n/locales/{fr,en,es,de,it,pt,nl}.json; do
            python3 -m json.tool "$file" >/dev/null
          done
          grep -q "maxPhotoScansPerMonth: 2" src/lib/billing/plans.ts
          grep -q "maxTestsPerMonth: 2" src/lib/billing/plans.ts
          ! grep -q "value: '+38%'" src/app/growth/page.tsx
          ! grep -q "value: '24/7'" src/app/growth/page.tsx

      - name: Commit P0-A implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p0-a): align public claims and Discovery limits [skip p0-a apply]'
          git push origin HEAD:fix/p0-a-marketing-truth
