name: Fix Growth Pro demo password

on:
  push:
    branches:
      - main
    paths:
      - scripts/fix-growth-pro-demo-password.mjs
      - .github/workflows/fix-growth-pro-demo-password.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: aqwelia-growth-pro-demo-password-fix
  cancel-in-progress: false

jobs:
  fix:
    name: Fix and verify Growth Pro demo account
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"context\":\"AQWELIA Growth Pro password fix\",\"description\":\"Correction du hash du compte démo Growth Pro\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - name: Validate direct production connection
        run: |
          node - <<'NODE'
          const url = process.env.DATABASE_URL || ''
          if (!/^postgres(ql)?:\/\//.test(url)) throw new Error('PRODUCTION_DIRECT_URL is required')
          if (new URL(url).hostname.includes('-pooler')) throw new Error('Direct Neon connection required')
          NODE
      - name: Generate PostgreSQL client
        run: bun run db:pg:generate
      - name: Fix Growth Pro demo password
        id: fix_account
        run: node scripts/fix-growth-pro-demo-password.mjs
      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          FIX_OUTCOME: ${{ steps.fix_account.outcome }}
        run: |
          if [ "${FIX_OUTCOME}" = "success" ]; then
            STATE=success
            DESCRIPTION="Hash Growth Pro corrigé et vérifié"
          else
            STATE=failure
            DESCRIPTION="Échec correction hash Growth Pro"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"${STATE}\",\"context\":\"AQWELIA Growth Pro password fix\",\"description\":\"${DESCRIPTION}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
