name: Authorized production database migration

on:
  pull_request:
    types: [opened]
    branches:
      - main
    paths:
      - .github/workflows/production-database-authorized-one-shot.yml

permissions:
  contents: read

concurrency:
  group: aqwelia-production-database
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate Neon production — authorized 2026-07-23
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      AUTHORIZATION: MIGRATE_AQWELIA_PRODUCTION
      PRODUCTION_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      PRODUCTION_DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Validate explicit authorization
        run: test "$AUTHORIZATION" = "MIGRATE_AQWELIA_PRODUCTION"
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - name: Validate production connection shapes without printing them
        run: |
          node - <<'NODE'
          const pooled = process.env.PRODUCTION_DATABASE_URL || ''
          const direct = process.env.PRODUCTION_DIRECT_URL || ''
          if (!/^postgres(ql)?:\/\//.test(pooled) || !/^postgres(ql)?:\/\//.test(direct)) throw new Error('Both production URLs are required')
          if (!new URL(pooled).hostname.includes('-pooler')) throw new Error('PRODUCTION_DATABASE_URL must be pooled')
          if (new URL(direct).hostname.includes('-pooler')) throw new Error('PRODUCTION_DIRECT_URL must be direct')
          if (new URL(pooled).hostname.replace('-pooler', '') !== new URL(direct).hostname) throw new Error('Production URLs target different Neon endpoints')
          console.log('Production connection shapes validated')
          NODE
      - name: Validate schema and baseline
        run: bun run test:postgresql
      - name: Generate PostgreSQL client
        env:
          DATABASE_URL: ${{ env.PRODUCTION_DIRECT_URL }}
        run: bun run db:pg:generate
      - name: Deploy reviewed migrations using direct connection
        env:
          DATABASE_URL: ${{ env.PRODUCTION_DIRECT_URL }}
        run: bun run db:pg:deploy
      - name: Verify pooled application connection and core tables
        env:
          DATABASE_URL: ${{ env.PRODUCTION_DATABASE_URL }}
        run: node tests/check-postgresql-connection.mjs
