name: P0-A Claim Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - fix/p0-a-marketing-truth

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Locate claims and plan limits
        shell: bash
        run: |
          set -euo pipefail
          echo '=== P0-A CLAIM OCCURRENCES ==='
          rg -n -i \
            --glob '!docs/audit/**' \
            --glob '!.next/**' \
            --glob '!node_modules/**' \
            --glob '!package-lock.json' \
            'QuickBooks|Xero|routage optimis|route optim|facturation conforme|synchronisation comptable|\+38\s*%|38\s*%|10 agents|agents? autonomes?|agents? dédiés?|24h/24|24/7|hors[- ]ligne|offline complet|full offline|2 scans|2 tests|maxPhotoScansPerMonth|maxTestsPerMonth' \
            src tests prisma docs 2>/dev/null || true
          echo '=== END P0-A CLAIM OCCURRENCES ==='
