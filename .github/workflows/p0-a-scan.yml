name: P0-A Apply

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-a-marketing-truth
          fetch-depth: 1

      - name: Apply truthful marketing and plan limits
        run: python3 scripts/p0-a-apply.py

      - name: Validate targeted changes
        shell: bash
        run: |
          set -euo pipefail
          for file in src/i18n/locales/{fr,en,es,de,it,pt,nl}.json; do
            python3 -m json.tool "$file" >/dev/null
          done
          grep -q "maxPhotoScansPerMonth: 2" src/lib/billing/plans.ts
          grep -q "maxTestsPerMonth: 2" src/lib/billing/plans.ts
          ! grep -q "value: '+38%'" src/app/growth/page.tsx
          ! grep -q "value: '24/7'" src/app/growth/page.tsx

      - name: Remove one-shot tooling and commit implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f P0_A_SCAN.txt
          rm -f scripts/p0-a-apply.py
          rm -f .github/workflows/p0-a-scan.yml
          rm -f .github/workflows/p0-a-apply.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p0-a): align public claims and Discovery limits [skip p0-a apply]'
          git push origin HEAD:fix/p0-a-marketing-truth
