name: Finalize P1-B dispatch v2

on:
  push:
    branches:
      - feat/p1-b-team-dispatch

permissions:
  contents: write

jobs:
  finalize:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip p1-b-finalize]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-b-team-dispatch
          fetch-depth: 1
      - name: Apply final correction when helper exists
        run: |
          if [ -f scripts/finalize-p1-b-dispatch.py ]; then
            python scripts/finalize-p1-b-dispatch.py
          fi
      - name: Remove temporary P1-B helpers
        run: |
          rm -f P1B_FINALIZE_TRIGGER.txt
          rm -f scripts/*p1-b*.py
          rm -f .github/workflows/*p1-b*.yml
      - name: Commit final branch state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p1-b): finalize technician dispatch implementation [skip p1-b-finalize]'
          git push origin HEAD:feat/p1-b-team-dispatch
