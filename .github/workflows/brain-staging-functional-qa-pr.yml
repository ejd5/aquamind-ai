name: AQWELIA Brain staging functional QA PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: aqwelia-brain-staging-functional-qa-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  recipe:
    name: Validate Brain on staging from PR
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      STABLE_URL: https://aqwelia-staging.vercel.app
      FALLBACK_URL: https://aqwelia-staging-git-feat-aqwelia-brain-fo-9dcf51-ejd5s-projects.vercel.app
      EXPECTED_MAIN_SHA: 09254f38710a57b9c11a22a3872b0d6c320b661f
      EXPECTED_EQUIVALENT_SHA: 1354800fd5e8e2e3b716e2846660c867ff9b760e
      QA_EMAIL: aqwelia-brain-qa-pr-${{ github.run_id }}@example.com
      QA_PASSWORD: Aqwelia-QA-2026!
      QA_OUTPUT_DIR: artifacts/brain-staging-functional-qa

    steps:
      - name: Checkout QA branch
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'

      - name: Install dependencies and Playwright
        run: |
          bun install --frozen-lockfile
          bun add --dev --no-save playwright@1.54.2
          bunx playwright install --with-deps chromium

      - name: Extract and run the reviewed isolated recipe
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$QA_OUTPUT_DIR" .qa-runtime
          awk '
            /cat > \/tmp\/brain-staging-qa.mjs <<.NODE./ {capture=1; next}
            capture && /^          NODE$/ {exit}
            capture {sub(/^          /, ""); print}
          ' .github/workflows/brain-staging-functional-qa.yml > .qa-runtime/brain-staging-qa.mjs
          test -s .qa-runtime/brain-staging-qa.mjs

          python3 - <<'PY'
          from pathlib import Path
          path = Path('.qa-runtime/brain-staging-qa.mjs')
          source = path.read_text()

          old_navigation = """const brainButton = page.getByRole('button', { name: /brain/i }).first()
            assert(await brainButton.count(), 'Authenticated application must expose a Brain navigation button')
            await brainButton.click()
            await page.waitForTimeout(2500)"""
          new_navigation = """const brainNavigation = await page.evaluate(() => {
              const buttons = [...document.querySelectorAll('aside nav button')]
              const labels = buttons.map((button) => (button.textContent || '').trim().replace(/\\s+/g, ' '))
              const button = buttons.find((candidate) => /brain/i.test(candidate.textContent || '')) || buttons[10]
              if (!button) return { clicked: false, labels }
              button.click()
              return {
                clicked: true,
                label: (button.textContent || '').trim().replace(/\\s+/g, ' '),
                labels,
              }
            })
            assert(brainNavigation.clicked, 'Authenticated application must expose a Brain navigation button', brainNavigation)
            await page.waitForTimeout(2500)"""
          if old_navigation not in source:
              raise SystemExit('Unable to patch Brain navigation selector in extracted recipe')
          source = source.replace(old_navigation, new_navigation)

          old_cleanup = """} finally {
            await context.close()
            await browser.close()
          }"""
          new_cleanup = """} finally {
            try {
              const cleanupResponse = await context.request.post(`${baseUrl}/api/account/delete`)
              const cleanupBody = await cleanupResponse.json().catch(() => null)
              console.log('QA account cleanup', cleanupResponse.status(), cleanupBody)
              if (!cleanupResponse.ok() && cleanupResponse.status() !== 401) {
                throw new Error(`QA account cleanup failed: ${cleanupResponse.status()}`)
              }
            } catch (cleanupError) {
              console.error('QA account cleanup error', cleanupError)
            }
            await context.close()
            await browser.close()
          }"""
          if old_cleanup not in source:
              raise SystemExit('Unable to patch authenticated QA cleanup in extracted recipe')
          path.write_text(source.replace(old_cleanup, new_cleanup))
          PY

          set +e
          node .qa-runtime/brain-staging-qa.mjs 2>&1 | tee "$QA_OUTPUT_DIR/execution.log"
          status=${PIPESTATUS[0]}
          set -e
          echo "$status" > "$QA_OUTPUT_DIR/exit-code.txt"
          exit "$status"

      - name: Upload QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aqwelia-brain-staging-functional-qa-pr
          path: artifacts/brain-staging-functional-qa
          if-no-files-found: warn
          retention-days: 14
