name: Apply P1-A CRM schema

on:
  push:
    branches:
      - feat/p1-a-pro-crm-foundation
    paths:
      - scripts/apply-p1-a-crm-schema.py
      - .github/workflows/apply-p1-a-crm-schema.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-a-pro-crm-foundation
          fetch-depth: 1

      - name: Apply schema, migrations and CRM helper
        run: python scripts/apply-p1-a-crm-schema.py

      - name: Remove one-time tooling
        run: |
          rm scripts/apply-p1-a-crm-schema.py
          rm .github/workflows/apply-p1-a-crm-schema.yml

      - name: Commit P1-A schema foundation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(p1-a): add Pro CRM schema foundation'
          git push origin HEAD:feat/p1-a-pro-crm-foundation
