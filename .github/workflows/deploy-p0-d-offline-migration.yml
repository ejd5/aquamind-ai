name: Deploy P0-D offline migration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-p0-d-offline-migration.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: aqwelia-production-p0-d-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Deploy and verify OfflineMutation ledger
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"context\":\"AQWELIA P0-D production migration\",\"description\":\"Déploiement du registre d'idempotence offline\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'

      - run: bun install --frozen-lockfile

      - name: Validate direct production connection
        run: |
          node - <<'NODE'
          const url = process.env.DATABASE_URL || ''
          if (!/^postgres(ql)?:\/\//.test(url)) throw new Error('PRODUCTION_DIRECT_URL is required')
          const hostname = new URL(url).hostname
          if (hostname.includes('-pooler')) throw new Error('Direct Neon connection required')
          NODE

      - name: Generate PostgreSQL client
        run: bun run db:pg:generate

      - name: Deploy pending PostgreSQL migrations
        id: migrate_database
        run: bunx prisma migrate deploy --schema prisma/postgresql/schema.prisma

      - name: Verify production ledger
        run: |
          node - <<'NODE'
          const { PrismaClient } = require('./src/generated/postgresql')
          const db = new PrismaClient()
          ;(async () => {
            const rows = await db.$queryRawUnsafe(`
              SELECT column_name
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'OfflineMutation'
              ORDER BY column_name
            `)
            const columns = new Set(rows.map((row) => row.column_name))
            for (const required of [
              'id', 'userId', 'idempotencyKey', 'method', 'path', 'requestHash',
              'state', 'statusCode', 'contentType', 'responseBody', 'createdAt',
              'updatedAt', 'expiresAt'
            ]) {
              if (!columns.has(required)) throw new Error(`Missing OfflineMutation.${required}`)
            }
            const indexes = await db.$queryRawUnsafe(`
              SELECT indexname
              FROM pg_indexes
              WHERE schemaname = 'public'
                AND tablename = 'OfflineMutation'
            `)
            const indexNames = new Set(indexes.map((row) => row.indexname))
            if (!indexNames.has('OfflineMutation_userId_idempotencyKey_key')) {
              throw new Error('Missing unique idempotency index')
            }
            console.log(`Verified OfflineMutation with ${columns.size} columns and ${indexNames.size} indexes`)
          })().finally(() => db.$disconnect())
          NODE

      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          MIGRATION_OUTCOME: ${{ steps.migrate_database.outcome }}
        run: |
          if [ "${MIGRATION_OUTCOME}" = "success" ]; then
            STATE=success
            DESCRIPTION="Registre d'idempotence déployé en production"
          else
            STATE=failure
            DESCRIPTION="Échec du déploiement P0-D"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"${STATE}\",\"context\":\"AQWELIA P0-D production migration\",\"description\":\"${DESCRIPTION}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
