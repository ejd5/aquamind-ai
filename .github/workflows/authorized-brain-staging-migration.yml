name: Authorized AQWELIA Brain staging migration

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

concurrency:
  group: aqwelia-staging-database
  cancel-in-progress: false

jobs:
  migrate:
    name: Migrate Neon staging for PR 20
    if: github.event.pull_request.number == 20 && github.event.pull_request.head.ref == 'feat/aqwelia-brain-foundation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging
    env:
      STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      STAGING_DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - name: Validate staging secret shapes without printing them
        run: |
          node - <<'NODE'
          const pooled = process.env.STAGING_DATABASE_URL || ''
          const direct = process.env.STAGING_DIRECT_URL || ''
          if (!/^postgres(ql)?:\/\//.test(pooled) || !/^postgres(ql)?:\/\//.test(direct)) throw new Error('Both staging URLs are required')
          if (!new URL(pooled).hostname.includes('-pooler')) throw new Error('STAGING_DATABASE_URL must be pooled')
          if (new URL(direct).hostname.includes('-pooler')) throw new Error('STAGING_DIRECT_URL must be direct')
          if (new URL(pooled).hostname.replace('-pooler', '') !== new URL(direct).hostname) throw new Error('Staging URLs target different Neon endpoints')
          NODE
      - name: Validate PostgreSQL schema and baseline
        run: bun run test:postgresql
      - name: Generate PostgreSQL client
        env:
          DATABASE_URL: ${{ env.STAGING_DIRECT_URL }}
        run: bun run db:pg:generate
      - name: Deploy reviewed Brain migrations to staging only
        env:
          DATABASE_URL: ${{ env.STAGING_DIRECT_URL }}
        run: bun run db:pg:deploy
      - name: Verify pooled staging application connection (read-only)
        env:
          DATABASE_URL: ${{ env.STAGING_DATABASE_URL }}
        run: node tests/check-postgresql-connection.mjs
