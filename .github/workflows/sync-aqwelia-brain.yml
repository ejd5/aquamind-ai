name: Sync AQWELIA Brain with main

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-aqwelia-brain
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Brain branch
        uses: actions/checkout@v4
        with:
          ref: feat/aqwelia-brain-foundation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge main with guarded conflict resolution
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main

          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e

          conflicts=$(git diff --name-only --diff-filter=U || true)
          allowed=$'prisma/schema.prisma\nprisma/postgresql/schema.prisma'

          if [ -n "$conflicts" ]; then
            unexpected=$(comm -23 <(printf '%s\n' "$conflicts" | sort) <(printf '%s\n' "$allowed" | sort) || true)
            if [ -n "$unexpected" ]; then
              echo "Unexpected conflicts:" >&2
              echo "$unexpected" >&2
              exit 1
            fi

            for schema in prisma/schema.prisma prisma/postgresql/schema.prisma; do
              if git diff --name-only --diff-filter=U | grep -Fxq "$schema"; then
                git checkout --ours -- "$schema"

                if ! grep -q '^  consentAt' "$schema"; then
                  if ! grep -q '^  consentSource  String?$' "$schema"; then
                    echo "Cannot locate Lead.consentSource in $schema" >&2
                    exit 1
                  fi
                  sed -i '/^  consentSource  String?$/a\  consentAt      DateTime?' "$schema"
                fi

                git add "$schema"
              fi
            done
          elif [ "$merge_status" -ne 0 ]; then
            echo "Merge failed without resolvable conflicts" >&2
            exit 1
          fi

          rm -f package-lock.json docs/.brain-sync-trigger
          rm -f .github/workflows/brain-self-sync.yml
          rm -f .github/workflows/sync-aqwelia-brain.yml
          git add -A

          remaining=$(git diff --name-only --diff-filter=U || true)
          if [ -n "$remaining" ]; then
            echo "Unresolved conflicts remain:" >&2
            echo "$remaining" >&2
            exit 1
          fi

          git status --short
          git commit -m "chore(brain): sync foundation with current main"
          git push origin HEAD:feat/aqwelia-brain-foundation
