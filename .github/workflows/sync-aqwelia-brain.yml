name: Apply AQWELIA Brain active-pool fixes

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/sync-aqwelia-brain.yml

permissions:
  contents: write

concurrency:
  group: apply-aqwelia-brain-active-pool-fixes
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Brain branch
        uses: actions/checkout@v4
        with:
          ref: feat/aqwelia-brain-foundation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply guarded active-pool fixes
        run: |
          set -euo pipefail
          python3 scripts/apply-brain-review-fixes.py
          rm scripts/apply-brain-review-fixes.py
          git add -A
          git diff --cached --check
          git status --short
          git commit -m "fix(pool): bind Brain diagnostics to active pool"
          git push origin HEAD:feat/aqwelia-brain-foundation
