name: Deploy P1-B team dispatch migration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-p1-b-team-dispatch-migration.yml

permissions:
  contents: write
  statuses: write

concurrency:
  group: aqwelia-production-p1-b-team-dispatch
  cancel-in-progress: false

jobs:
  migrate:
    name: Deploy and verify technician dispatch schema
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"context\":\"AQWELIA P1-B production migration\",\"description\":\"Déploiement des profils techniciens dans Neon\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'

      - run: bun install --frozen-lockfile

      - name: Validate direct production connection
        run: |
          node - <<'NODE'
          const value = process.env.DATABASE_URL || ''
          if (!/^postgres(ql)?:\/\//.test(value)) throw new Error('PRODUCTION_DIRECT_URL is required')
          const hostname = new URL(value).hostname
          if (hostname.includes('-pooler')) throw new Error('Direct Neon connection required')
          NODE

      - name: Generate PostgreSQL client
        run: bun run db:pg:generate

      - name: Deploy pending PostgreSQL migrations
        id: migrate_database
        run: bunx prisma migrate deploy --schema prisma/postgresql/schema.prisma

      - name: Verify production dispatch schema
        id: verify_schema
        run: |
          node - <<'NODE'
          const { PrismaClient } = require('./generated/client-postgresql')
          const db = new PrismaClient()
          ;(async () => {
            const rows = await db.$queryRawUnsafe(`
              SELECT column_name
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'OrganizationMember'
            `)
            const columns = new Set(rows.map((row) => row.column_name))
            for (const required of [
              'dispatchEnabled', 'skills', 'serviceZones', 'workingDays',
              'dayStart', 'dayEnd', 'timeZone', 'dailyCapacityMinutes',
              'dispatchColor', 'phone', 'vehicle'
            ]) {
              if (!columns.has(required)) throw new Error(`Missing OrganizationMember.${required}`)
            }

            const indexes = await db.$queryRawUnsafe(`
              SELECT indexname
              FROM pg_indexes
              WHERE schemaname = 'public'
                AND tablename = 'OrganizationMember'
            `)
            const indexNames = new Set(indexes.map((row) => row.indexname))
            if (!indexNames.has('OrganizationMember_organizationId_dispatchEnabled_idx')) {
              throw new Error('Missing dispatch availability index')
            }

            const migration = await db.$queryRawUnsafe(`
              SELECT migration_name, finished_at, rolled_back_at
              FROM "_prisma_migrations"
              WHERE migration_name = '20260724014500_p1_b_team_dispatch'
              ORDER BY started_at DESC
              LIMIT 1
            `)
            if (!migration[0]?.finished_at || migration[0]?.rolled_back_at) {
              throw new Error('P1-B production migration is not marked successful')
            }

            console.log(`Verified ${columns.size} OrganizationMember columns and ${indexNames.size} indexes in production`)
          })().finally(() => db.$disconnect())
          NODE

      - name: Publish successful status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"success\",\"context\":\"AQWELIA P1-B production migration\",\"description\":\"Profils techniciens déployés et vérifiés dans Neon\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - name: Remove one-time workflow after success
        run: |
          rm .github/workflows/deploy-p1-b-team-dispatch-migration.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore: remove one-time P1-B production migration workflow'
          git push origin HEAD:main
