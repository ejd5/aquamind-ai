name: Deploy P1-A Pro CRM migration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy-p1-a-pro-crm-migration.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: aqwelia-production-p1-a-crm-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Deploy and verify Pro CRM schema
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"context\":\"AQWELIA P1-A production migration\",\"description\":\"Déploiement du CRM Pro dans Neon\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"

      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'

      - run: bun install --frozen-lockfile

      - name: Validate direct production connection
        run: |
          node - <<'NODE'
          const value = process.env.DATABASE_URL || ''
          if (!/^postgres(ql)?:\/\//.test(value)) throw new Error('PRODUCTION_DIRECT_URL is required')
          const hostname = new URL(value).hostname
          if (hostname.includes('-pooler')) throw new Error('Direct Neon connection required')
          NODE

      - name: Generate PostgreSQL client
        run: bun run db:pg:generate

      - name: Deploy pending PostgreSQL migrations
        id: migrate_database
        run: bunx prisma migrate deploy --schema prisma/postgresql/schema.prisma

      - name: Verify production CRM schema
        id: verify_schema
        run: |
          node - <<'NODE'
          const { PrismaClient } = require('./generated/client-postgresql')
          const db = new PrismaClient()

          const requiredColumns = {
            ProClient: [
              'companyName', 'status', 'source', 'preferredContact', 'tags',
              'lastContactAt', 'nextFollowUpAt'
            ],
            ProPool: [
              'status', 'brand', 'model', 'serialNumber', 'installedAt',
              'accessInstructions', 'equipmentNotes', 'lastServiceAt', 'nextServiceAt'
            ],
            ProIntervention: [
              'priority', 'startedAt', 'summary', 'customerNotes', 'internalNotes',
              'billable', 'amount', 'currency'
            ],
            ProClientActivity: [
              'id', 'proClientId', 'actorUserId', 'type', 'title', 'details',
              'occurredAt', 'createdAt'
            ],
          }

          ;(async () => {
            const tables = Object.keys(requiredColumns)
            const rows = await db.$queryRawUnsafe(`
              SELECT table_name, column_name
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name IN (${tables.map((_, index) => `$${index + 1}`).join(', ')})
            `, ...tables)

            const available = new Map()
            for (const row of rows) {
              const names = available.get(row.table_name) || new Set()
              names.add(row.column_name)
              available.set(row.table_name, names)
            }

            for (const [table, columns] of Object.entries(requiredColumns)) {
              const present = available.get(table)
              if (!present) throw new Error(`Missing production table ${table}`)
              for (const column of columns) {
                if (!present.has(column)) throw new Error(`Missing production column ${table}.${column}`)
              }
            }

            const indexes = await db.$queryRawUnsafe(`
              SELECT tablename, indexname
              FROM pg_indexes
              WHERE schemaname = 'public'
                AND tablename IN ('ProClient', 'ProPool', 'ProIntervention', 'ProClientActivity')
            `)
            const indexNames = new Set(indexes.map((row) => row.indexname))
            for (const required of [
              'ProClient_status_idx',
              'ProClient_nextFollowUpAt_idx',
              'ProPool_nextServiceAt_idx',
              'ProIntervention_priority_idx',
              'ProClientActivity_proClientId_occurredAt_idx',
            ]) {
              if (!indexNames.has(required)) throw new Error(`Missing production index ${required}`)
            }

            const migration = await db.$queryRawUnsafe(`
              SELECT migration_name, finished_at, rolled_back_at
              FROM "_prisma_migrations"
              WHERE migration_name = '20260724004500_p1_a_pro_crm_foundation'
              ORDER BY started_at DESC
              LIMIT 1
            `)
            if (!migration[0]?.finished_at || migration[0]?.rolled_back_at) {
              throw new Error('P1-A production migration is not marked successful')
            }

            console.log(`Verified ${tables.length} CRM tables and ${indexNames.size} related indexes in production`)
          })().finally(() => db.$disconnect())
          NODE

      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          MIGRATION_OUTCOME: ${{ steps.migrate_database.outcome }}
          VERIFY_OUTCOME: ${{ steps.verify_schema.outcome }}
        run: |
          if [ "${MIGRATION_OUTCOME}" = "success" ] && [ "${VERIFY_OUTCOME}" = "success" ]; then
            STATE=success
            DESCRIPTION="CRM Pro déployé et vérifié dans Neon"
          else
            STATE=failure
            DESCRIPTION="Échec du déploiement ou de la vérification P1-A"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"${STATE}\",\"context\":\"AQWELIA P1-A production migration\",\"description\":\"${DESCRIPTION}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
