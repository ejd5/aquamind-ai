name: P0-D Apply Offline Idempotency

on:
  push:
    branches:
      - fix/p0-d-offline-idempotency

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-d-offline-idempotency
          fetch-depth: 1

      - name: Apply server ledger, migrations and tests
        run: python3 scripts/p0-d-apply.py

      - name: Remove one-shot files and commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f P0D_SCAN.txt
          rm -f scripts/p0-d-apply.py
          rm -f .github/workflows/p0-d-scan.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p0-d): add server-backed offline idempotency ledger'
          git push origin HEAD:fix/p0-d-offline-idempotency
