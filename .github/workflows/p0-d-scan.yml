name: P0-D Offline Write Scan

on:
  push:
    branches:
      - fix/p0-d-offline-idempotency

permissions:
  contents: write

jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-d-offline-idempotency
          fetch-depth: 1

      - name: Locate queue producers
        shell: bash
        run: |
          set -euo pipefail
          git grep -n 'queueAction' -- src > P0D_SCAN.txt || true
          git grep -n 'flushPending' -- src >> P0D_SCAN.txt || true
          git grep -n 'pendingActions' -- src >> P0D_SCAN.txt || true

      - name: Commit route map
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add P0D_SCAN.txt
          git commit -m 'chore(p0-d): capture offline queue targets'
          git push origin HEAD:fix/p0-d-offline-idempotency
