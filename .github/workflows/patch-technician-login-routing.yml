name: Patch technician login routing

on:
  push:
    branches:
      - fix/pro-technician-login-routing

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip technician-routing-patch]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/pro-technician-login-routing
          fetch-depth: 1
      - run: python scripts/patch-technician-login-routing.py
      - name: Remove one-time patch helpers
        run: |
          rm -f scripts/patch-technician-login-routing.py
          rm -f .github/workflows/patch-technician-login-routing.yml
          rm -f TECHNICIAN_ROUTING_TRIGGER.txt
      - name: Commit patched sign-in routing
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(auth): route pro technicians to their workspace [skip technician-routing-patch]'
          git push origin HEAD:fix/pro-technician-login-routing
