name: P0-B Typecheck Diagnostic

on:
  push:
    branches:
      - fix/p0-b-photo-privacy

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip p0-b-debug]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/p0-b-photo-privacy
          fetch-depth: 1

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Capture TypeScript output
        shell: bash
        run: |
          set +e
          bun install --frozen-lockfile >/tmp/install.log 2>&1
          bun run db:generate:all >/tmp/generate.log 2>&1
          bun run typecheck >P0B_TYPECHECK.txt 2>&1
          code=$?
          echo "TYPECHECK_EXIT_CODE=$code" >> P0B_TYPECHECK.txt
          exit 0

      - name: Commit diagnostic output
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add P0B_TYPECHECK.txt
          git commit -m 'chore(p0-b): capture typecheck output [skip p0-b-debug]'
          git push origin HEAD:fix/p0-b-photo-privacy
