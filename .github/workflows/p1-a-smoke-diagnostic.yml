name: P1-A Smoke Diagnostic

on:
  push:
    branches:
      - feat/p1-a-pro-crm-foundation
    paths:
      - .github/workflows/p1-a-smoke-diagnostic.yml
      - P1A_SMOKE_TRIGGER.txt

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-a-pro-crm-foundation
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - name: Run official smoke runner and capture failure
        shell: bash
        run: |
          set +e
          bash tests/run-smoke-tests.sh > /tmp/p1-a-smoke.log 2>&1
          CODE=$?
          tail -n 700 /tmp/p1-a-smoke.log > P1A_SMOKE_FAILURE.txt
          echo "exit_code=${CODE}" >> P1A_SMOKE_FAILURE.txt
          exit 0
      - name: Commit diagnostic
        run: |
          rm -f P1A_SMOKE_TRIGGER.txt
          rm -f .github/workflows/p1-a-smoke-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(p1-a): capture exact smoke failure [skip diagnostic]'
          git push origin HEAD:feat/p1-a-pro-crm-foundation
