name: Secure P1-A service photos

on:
  push:
    branches:
      - feat/p1-a-pro-crm-foundation
    paths:
      - scripts/secure-p1-a-service-photos.py
      - .github/workflows/secure-p1-a-service-photos.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-a-pro-crm-foundation
          fetch-depth: 1
      - run: python scripts/secure-p1-a-service-photos.py
      - run: |
          rm scripts/secure-p1-a-service-photos.py
          rm .github/workflows/secure-p1-a-service-photos.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p1-a): prevent embedded service photo persistence'
          git push origin HEAD:feat/p1-a-pro-crm-foundation
