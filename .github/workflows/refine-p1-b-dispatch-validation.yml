name: Refine P1-B dispatch validation

on:
  push:
    branches:
      - feat/p1-b-team-dispatch
    paths:
      - scripts/refine-p1-b-dispatch-validation.py
      - .github/workflows/refine-p1-b-dispatch-validation.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-b-team-dispatch
          fetch-depth: 1
      - run: python scripts/refine-p1-b-dispatch-validation.py
      - run: |
          rm scripts/refine-p1-b-dispatch-validation.py
          rm .github/workflows/refine-p1-b-dispatch-validation.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p1-b): scope availability checks to schedule changes'
          git push origin HEAD:feat/p1-b-team-dispatch
