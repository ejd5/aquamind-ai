name: Seed Growth demo profiles

on:
  push:
    branches:
      - ops/seed-growth-demo-profiles
    paths:
      - scripts/seed-growth-demo-profiles.mjs
      - .github/workflows/seed-growth-demo-profiles.yml

permissions:
  contents: read
  statuses: write

concurrency:
  group: aqwelia-growth-demo-seed
  cancel-in-progress: false

jobs:
  seed:
    name: Seed three Growth demo workspaces
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Publish pending status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"pending\",\"context\":\"AQWELIA Growth demo seed\",\"description\":\"Création des 3 profils Growth en cours\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - name: Validate direct production connection shape
        run: |
          node - <<'NODE'
          const url = process.env.DATABASE_URL || ''
          if (!/^postgres(ql)?:\/\//.test(url)) throw new Error('PRODUCTION_DIRECT_URL is required')
          if (new URL(url).hostname.includes('-pooler')) throw new Error('Demo seed must use the direct Neon connection')
          NODE
      - name: Generate PostgreSQL client
        run: bun run db:pg:generate
      - name: Seed Growth demo profiles
        id: seed_profiles
        run: node scripts/seed-growth-demo-profiles.mjs
      - name: Publish final status
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          SEED_OUTCOME: ${{ steps.seed_profiles.outcome }}
        run: |
          if [ "${SEED_OUTCOME}" = "success" ]; then
            STATE=success
            DESCRIPTION="3 profils Growth créés et vérifiés"
          else
            STATE=failure
            DESCRIPTION="Échec de création des profils Growth"
          fi
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -d "{\"state\":\"${STATE}\",\"context\":\"AQWELIA Growth demo seed\",\"description\":\"${DESCRIPTION}\",\"target_url\":\"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}\"}"
