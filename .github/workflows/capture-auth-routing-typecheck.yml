name: Capture auth routing typecheck

on:
  push:
    branches:
      - fix/pro-technician-login-routing

permissions:
  contents: write

jobs:
  capture:
    if: ${{ !contains(github.event.head_commit.message || '', '[skip auth-typecheck-capture]') }}
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:/tmp/aqwelia-ci.db
      NEXTAUTH_SECRET: test-secret-for-ci-only-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3099
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/pro-technician-login-routing
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - run: bun run db:generate
      - name: Capture typecheck output
        run: |
          set +e
          bun run typecheck > AUTH_TYPECHECK_RESULT.txt 2>&1
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> AUTH_TYPECHECK_RESULT.txt
          exit 0
      - name: Remove one-time workflow and trigger
        run: |
          rm -f .github/workflows/capture-auth-routing-typecheck.yml
          rm -f AUTH_TYPECHECK_TRIGGER.txt
      - name: Commit diagnostic output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(auth): capture routing typecheck output [skip auth-typecheck-capture]'
          git push origin HEAD:fix/pro-technician-login-routing
