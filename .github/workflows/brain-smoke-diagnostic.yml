name: Capture Brain smoke failure summary

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/brain-smoke-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Brain branch
        uses: actions/checkout@v4
        with:
          ref: feat/aqwelia-brain-foundation
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke test and retain concise diagnostics
        shell: bash
        run: |
          set +e
          bash tests/run-smoke-tests.sh > /tmp/brain-smoke.log 2>&1
          status=$?
          set -e
          {
            echo "exit_status=$status"
            echo "--- last 400 lines ---"
            tail -400 /tmp/brain-smoke.log
          } > docs/.brain-smoke-diagnostic.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/.brain-smoke-diagnostic.log
          git commit -m "test(brain): capture smoke diagnostic"
          git push origin HEAD:feat/aqwelia-brain-foundation
