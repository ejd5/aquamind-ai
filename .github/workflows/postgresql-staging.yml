name: PostgreSQL Staging Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'prisma/**'
      - 'scripts/sync-postgresql-schema.mjs'
      - 'tests/test-postgresql.mjs'
      - 'tests/check-postgresql-schema.sh'
      - '.github/workflows/postgresql-staging.yml'
  push:
    branches:
      - 'test/p0-e-*'

permissions:
  contents: read

jobs:
  postgresql-validate:
    name: Validate PostgreSQL migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aqwelia_ci
          POSTGRES_PASSWORD: ci_password_change_me
          POSTGRES_DB: aqwelia_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aqwelia_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_TEST_DATABASE_URL: postgresql://aqwelia_ci:ci_password_change_me@localhost:5432/aqwelia_ci
      DATABASE_URL: file:/tmp/aqwelia-ci.db
      NEXTAUTH_SECRET: test-secret-for-ci-only-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3099
      AUTH_TRUST_HOST: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync PostgreSQL schema
        run: bun run db:pg:sync

      - name: Validate PostgreSQL schema
        run: bunx prisma validate --schema prisma/postgresql/schema.prisma

      - name: Check baseline sync
        run: bash tests/check-postgresql-schema.sh
        env:
          POSTGRES_TEST_DATABASE_URL: ${{ env.POSTGRES_TEST_DATABASE_URL }}

      - name: Deploy migrations to PostgreSQL
        run: bunx prisma migrate deploy --schema prisma/postgresql/schema.prisma
        env:
          DATABASE_URL: ${{ env.POSTGRES_TEST_DATABASE_URL }}

      - name: Generate Prisma Client (PostgreSQL)
        run: bunx prisma generate --schema prisma/postgresql/schema.prisma

      - name: Run PostgreSQL integration tests
        run: bun run test:postgresql:integration
        env:
          DATABASE_URL: ${{ env.POSTGRES_TEST_DATABASE_URL }}
