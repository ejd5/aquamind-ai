name: PostgreSQL staging validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'prisma/**'
      - 'scripts/migrate-sqlite-to-postgres.mjs'
      - 'scripts/sync-postgresql-schema.mjs'
      - 'tests/postgresql.test.mjs'
      - 'tests/seed-migration-fixture.mjs'
      - 'tests/verify-postgresql-migration.mjs'
      - '.github/workflows/postgresql-staging.yml'
      - 'package.json'

permissions:
  contents: read

jobs:
  postgresql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aqwelia_ci
          POSTGRES_PASSWORD: ci-only-password
          POSTGRES_DB: aqwelia_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aqwelia_ci -d aqwelia_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_TEST_DATABASE_URL: postgresql://aqwelia_ci:ci-only-password@127.0.0.1:5432/aqwelia_ci
      DATABASE_URL: file:/tmp/aqwelia-migration-fixture.db
      NEXTAUTH_SECRET: ci-only-nextauth-secret
      NEXTAUTH_URL: http://localhost:3099
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - name: Validate generated PostgreSQL schema
        run: bun run test:postgresql
      - name: Generate both Prisma clients
        run: |
          bun run db:generate
          bun run db:pg:generate
      - name: Deploy PostgreSQL baseline
        env:
          DATABASE_URL: ${{ env.POSTGRES_TEST_DATABASE_URL }}
        run: bun run db:pg:deploy
      - name: Run PostgreSQL integration tests
        run: bun run test:postgresql:integration
      - name: Create SQLite migration fixture
        run: |
          rm -f /tmp/aqwelia-migration-fixture.db
          bun run db:push
          node tests/seed-migration-fixture.mjs
      - name: Execute and verify migration
        env:
          SQLITE_URL: file:/tmp/aqwelia-migration-fixture.db
          POSTGRES_URL: ${{ env.POSTGRES_TEST_DATABASE_URL }}
          EXPORT_DIR: /tmp/aqwelia-migration-success
        run: |
          node scripts/migrate-sqlite-to-postgres.mjs --execute --confirm
          node tests/verify-postgresql-migration.mjs
          if node scripts/migrate-sqlite-to-postgres.mjs --execute --confirm; then
            echo 'Second migration unexpectedly succeeded' >&2
            exit 1
          fi
      - name: Prove transactional rollback
        env:
          PGPASSWORD: ci-only-password
        run: |
          createdb -h 127.0.0.1 -U aqwelia_ci aqwelia_rollback
          DATABASE_URL=postgresql://aqwelia_ci:ci-only-password@127.0.0.1:5432/aqwelia_rollback bun run db:pg:deploy
          SQLITE_URL=file:/tmp/aqwelia-migration-fixture.db POSTGRES_URL=postgresql://aqwelia_ci:ci-only-password@127.0.0.1:5432/aqwelia_rollback EXPORT_DIR=/tmp/aqwelia-migration-rollback MIGRATION_TEST_FAIL_AFTER_MODEL=User node scripts/migrate-sqlite-to-postgres.mjs --execute --confirm && exit 1 || true
          POSTGRES_URL=postgresql://aqwelia_ci:ci-only-password@127.0.0.1:5432/aqwelia_rollback node tests/verify-postgresql-migration.mjs --expect-empty
