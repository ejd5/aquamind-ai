name: Remove P1-A placeholder reports

on:
  push:
    branches:
      - feat/p1-a-pro-crm-foundation
    paths:
      - scripts/remove-p1-a-placeholder-reports.py
      - .github/workflows/remove-p1-a-placeholder-reports.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-a-pro-crm-foundation
          fetch-depth: 1
      - run: python scripts/remove-p1-a-placeholder-reports.py
      - run: |
          rm scripts/remove-p1-a-placeholder-reports.py
          rm .github/workflows/remove-p1-a-placeholder-reports.yml
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(p1-a): remove unavailable report actions'
          git push origin HEAD:feat/p1-a-pro-crm-foundation
