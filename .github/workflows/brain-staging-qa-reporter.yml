name: AQWELIA Brain staging QA reporter

on:
  push:
    branches:
      - qa/brain-staging-recipe-20260722

permissions:
  actions: read
  contents: write

jobs:
  report:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout QA branch
        uses: actions/checkout@v4
        with:
          ref: qa/brain-staging-recipe-20260722
          fetch-depth: 0

      - name: Wait for functional QA and download evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p qa-results downloaded-artifact
          run_id=''
          conclusion=''

          for attempt in $(seq 1 100); do
            runs=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs?branch=qa%2Fbrain-staging-recipe-20260722&event=push&per_page=100")

            run_id=$(printf '%s' "$runs" | jq -r --arg sha "$TARGET_SHA" '
              [.workflow_runs[]
                | select(.name == "AQWELIA Brain staging functional QA")
                | select(.head_sha == $sha)][0].id // empty')
            status=$(printf '%s' "$runs" | jq -r --arg sha "$TARGET_SHA" '
              [.workflow_runs[]
                | select(.name == "AQWELIA Brain staging functional QA")
                | select(.head_sha == $sha)][0].status // empty')
            conclusion=$(printf '%s' "$runs" | jq -r --arg sha "$TARGET_SHA" '
              [.workflow_runs[]
                | select(.name == "AQWELIA Brain staging functional QA")
                | select(.head_sha == $sha)][0].conclusion // empty')

            echo "Attempt $attempt: run=$run_id status=$status conclusion=$conclusion"
            if [ -n "$run_id" ] && [ "$status" = "completed" ]; then
              break
            fi
            sleep 15
          done

          if [ -z "$run_id" ] || [ -z "$conclusion" ]; then
            conclusion='reporter_timeout'
          fi

          if [ -n "$run_id" ]; then
            artifacts=$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/$run_id/artifacts")
            artifact_url=$(printf '%s' "$artifacts" | jq -r '
              [.artifacts[] | select(.name == "aqwelia-brain-staging-functional-qa")][0].archive_download_url // empty')
            if [ -n "$artifact_url" ]; then
              curl -fsSL -L \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "$artifact_url" -o /tmp/qa-artifact.zip
              unzip -q /tmp/qa-artifact.zip -d downloaded-artifact || true
            fi
          fi

          {
            echo '# AQWELIA Brain â€” rĂ©sultat de recette staging'
            echo
            echo "- Commit QA : \`$TARGET_SHA\`"
            echo "- Run GitHub Actions : \`${run_id:-introuvable}\`"
            echo "- Conclusion : **$conclusion**"
            echo "- Production : **non touchĂ©e**"
            echo
            if [ -f downloaded-artifact/summary.md ]; then
              cat downloaded-artifact/summary.md
            else
              echo 'Le rĂ©sumĂ© dĂ©taillĂ© nâ€™a pas Ă©tĂ© produit. Consulter le rapport JSON ou les journaux du run.'
            fi
          } > qa-results/brain-staging-functional-qa.md

          if [ -f downloaded-artifact/report.json ]; then
            cp downloaded-artifact/report.json qa-results/brain-staging-functional-qa.json
          fi

          echo "QA_CONCLUSION=$conclusion" >> "$GITHUB_ENV"

      - name: Commit persisted QA result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add qa-results/brain-staging-functional-qa.md qa-results/brain-staging-functional-qa.json 2>/dev/null || true
          git commit -m 'test(qa): publish Brain staging recipe result [skip ci]' || exit 0
          git push origin HEAD:qa/brain-staging-recipe-20260722

      - name: Fail reporter when recipe failed
        if: env.QA_CONCLUSION != 'success'
        run: exit 1
