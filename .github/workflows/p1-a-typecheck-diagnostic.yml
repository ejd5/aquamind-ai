name: P1-A Typecheck Diagnostic

on:
  push:
    branches:
      - feat/p1-a-pro-crm-foundation
    paths:
      - .github/workflows/p1-a-typecheck-diagnostic.yml
      - P1A_TYPECHECK_TRIGGER.txt

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/p1-a-pro-crm-foundation
          fetch-depth: 1
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.4'
      - run: bun install --frozen-lockfile
      - run: bun run db:generate:all
      - name: Capture typecheck output
        shell: bash
        run: |
          set +e
          bun run typecheck > P1A_TYPECHECK.txt 2>&1
          echo "exit_code=$?" >> P1A_TYPECHECK.txt
          exit 0
      - name: Commit diagnostic and remove temporary trigger
        run: |
          rm -f P1A_TYPECHECK_TRIGGER.txt
          rm -f .github/workflows/p1-a-typecheck-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'chore(p1-a): capture typecheck diagnostic [skip diagnostic]'
          git push origin HEAD:feat/p1-a-pro-crm-foundation
