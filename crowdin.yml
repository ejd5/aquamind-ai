# Crowdin configuration for AQWELIA
# https://crowdin.github.io/crowdin-cli/configuration/
#
# This file tells Crowdin CLI which files to sync and how.
# Source language: French (fr)
# Target languages: en, es, de, it, pt, nl

"project_id": "YOUR_PROJECT_ID"
"api_token": "YOUR_API_TOKEN"

"base_path": "."
"base_url": "https://api.crowdin.com"

"preserve_hierarchy": true

files:
  - source: /src/i18n/locales/fr.json
    translation: /src/i18n/locales/%two_letters_code%.json
    type: json
    update_option: update_as_unapproved
    languages_mapping:
      two_letters_code:
        en: en
        es: es
        de: de
        it: it
        pt: pt
        nl: nl
